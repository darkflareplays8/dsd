<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Delta Executor – VoidHub</title>
  <meta name="description" content="Install Delta Executor directly on iOS via VoidHub. No ads. No BS. Open source.">
  <meta property="og:title" content="Delta Executor – VoidHub | Direct Install">
  <meta property="og:description" content="Install Delta Executor directly on iOS via VoidHub. No ads. No BS. Open source.">
  <meta name="keywords" content="delta executor, ios, open source, voidhub">
  <meta name="theme-color" content="#7c3aed">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #9d5cff;
      --accent-dim: #6d28d9;
      --bg: #05030a;
      --surface: #0d0a14;
      --border: #1f1535;
      --text: #e8e0f5;
      --muted: #5a4f72;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(120,50,220,0.18) 0%, rgba(80,20,160,0.06) 50%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 80px rgba(100,30,200,0.15), 0 0 0 1px rgba(120,60,220,0.08);
      animation: none;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: rgba(140,70,255,0.12);
      border: 1px solid rgba(140,70,255,0.3);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    h1 span { color: var(--accent); }

    .version {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      text-decoration: none;
      color: white;
    }

    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: default; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #9d5cff);
      margin-bottom: 12px;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-bottom: 12px;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .footer span { color: #444; margin: 0 6px; }

    .error-msg {
      font-size: 12px;
      color: var(--accent);
      margin-top: 8px;
      display: none;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(140,70,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-spinner"></div>
    <span class="loader-text">Loading…</span>
  </div>

  <div class="card">
    <div class="badge">VoidHub | Direct Install</div>
    <h1>Delta <span>Executor</span></h1>
    <p class="version" id="version-line">Loading…</p>
    <p style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:24px;">⚠ iOS Only</p>
    <div class="divider"></div>

    <button class="btn btn-primary" id="btn-install" onclick="directInstall(this)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
        <path d="M8 12l4 4 4-4M12 8v8"/>
      </svg>
      Direct Install
    </button>

    <a class="btn btn-secondary" id="btn-download" href="#" style="pointer-events:none;opacity:0.5;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download .ipa
    </a>

    <a class="btn btn-secondary" href="https://discord.gg/Hqxp62fScx" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Join Discord
    </a>

    <a class="btn btn-secondary" href="https://github.com/darkflareplays8/dsd" target="_blank">
      Open Source
    </a>

    <p class="error-msg" id="error-msg"></p>

    <div class="footer">
      From VoidHub <span>·</span> By ProFlare
    </div>
  </div>

  <script>
    const REPO = 'darkflareplays8/dsd';
    const API_URL = `https://api.github.com/repos/${REPO}/releases/latest`;

    async function fetchLatestRelease() {
      const res = await fetch(API_URL, {
        headers: { Accept: 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const data = await res.json();
      const asset = data.assets && data.assets[0];
      if (!asset) throw new Error('No asset on latest release');
      return {
        ipaUrl: asset.browser_download_url,
        version: (data.tag_name || '').replace(/^v/i, '')
      };
    }

    async function fetchIpaVersion(ipaUrl) {
      const head = await fetch(ipaUrl, { method: 'HEAD' });
      const size = parseInt(head.headers.get('content-length') || '0', 10);
      if (!size) return null;

      const tailSize = Math.min(65536, size);
      const tailRes = await fetch(ipaUrl, {
        headers: { Range: `bytes=${size - tailSize}-${size - 1}` }
      });
      if (!tailRes.ok) return null;

      const tailBuf   = await tailRes.arrayBuffer();
      const tailBytes = new Uint8Array(tailBuf);
      const tailView  = new DataView(tailBuf);

      let eocdOff = -1;
      for (let i = tailBytes.length - 22; i >= 0; i--) {
        if (tailBytes[i]===0x50 && tailBytes[i+1]===0x4b &&
            tailBytes[i+2]===0x05 && tailBytes[i+3]===0x06) {
          eocdOff = i;
          break;
        }
      }
      if (eocdOff < 0) return null;

      const cdOffset  = tailView.getUint32(eocdOff + 16, true);
      const cdInBuf   = cdOffset - (size - tailSize);
      if (cdInBuf < 0) return null;

      const dec = new TextDecoder();
      let pos = cdInBuf;

      while (pos + 46 <= eocdOff) {
        if (tailBytes[pos]!==0x50 || tailBytes[pos+1]!==0x4b ||
            tailBytes[pos+2]!==0x01 || tailBytes[pos+3]!==0x02) break;

        const fnLen      = tailView.getUint16(pos + 28, true);
        const extraLen   = tailView.getUint16(pos + 30, true);
        const commentLen = tailView.getUint16(pos + 32, true);
        const method     = tailView.getUint16(pos + 10, true);
        const compSize   = tailView.getUint32(pos + 20, true);
        const localOff   = tailView.getUint32(pos + 42, true);
        const name       = dec.decode(tailBytes.slice(pos + 46, pos + 46 + fnLen));

        if (/^Payload\/[^/]+\.app\/Info\.plist$/i.test(name)) {
          const localRes = await fetch(ipaUrl, {
            headers: { Range: `bytes=${localOff}-${localOff + 30 + fnLen + 65535 + compSize}` }
          });
          if (!localRes.ok) return null;

          const lBuf   = await localRes.arrayBuffer();
          const lBytes = new Uint8Array(lBuf);
          const lView  = new DataView(lBuf);
          const dStart = 30 + lView.getUint16(26, true) + lView.getUint16(28, true);
          const data   = lBytes.slice(dStart, dStart + compSize);

          let plistBytes;
          if (method === 0) {
            plistBytes = data;
          } else if (method === 8) {
            const ds     = new DecompressionStream('deflate-raw');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(data);
            writer.close();
            const chunks = [];
            for (;;) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
            }
            const total = chunks.reduce((a, c) => a + c.length, 0);
            plistBytes  = new Uint8Array(total);
            let off = 0;
            for (const c of chunks) { plistBytes.set(c, off); off += c.length; }
          } else {
            return null;
          }

          const xml = new TextDecoder().decode(plistBytes);
          const m1  = xml.match(/<key>CFBundleShortVersionString<\/key>\s*<string>([^<]+)<\/string>/);
          if (m1) return m1[1].trim();
          const m2  = xml.match(/<key>CFBundleVersion<\/key>\s*<string>([^<]+)<\/string>/);
          if (m2) return m2[1].trim();
          return null;
        }

        pos += 46 + fnLen + extraLen + commentLen;
      }

      return null;
    }

    function buildManifestUri() {
      return `${location.origin}/manifest.plist`;
    }

    function hideLoader() {
      const loader = document.getElementById('loader');
      const card   = document.querySelector('.card');
      loader.classList.add('hidden');
      setTimeout(() => {
        loader.remove();
        card.style.opacity   = '1';
        card.style.transform = 'translateY(0)';
      }, 400);
    }

    async function init() {
      const versionEl  = document.getElementById('version-line');
      const btnInstall = document.getElementById('btn-install');
      const btnDl      = document.getElementById('btn-download');
      const errorEl    = document.getElementById('error-msg');

      try {
        const { ipaUrl, version: releaseVersion } = await fetchLatestRelease();

        versionEl.textContent     = `v${releaseVersion} · iOS 13+`;
        btnDl.href                = ipaUrl;
        btnDl.download            = `delta-${releaseVersion}.ipa`;
        btnDl.style.pointerEvents = '';
        btnDl.style.opacity       = '';

        hideLoader();

        let displayVersion = releaseVersion;
        try {
          const parsed = await fetchIpaVersion(ipaUrl);
          if (parsed) {
            displayVersion = parsed;
            versionEl.textContent = `v${displayVersion} · iOS 13+`;
          }
        } catch (_) {}

        btnInstall.dataset.manifest = buildManifestUri();
        btnInstall.disabled = false;

      } catch (err) {
        hideLoader();
        versionEl.textContent = 'Failed to load';
        errorEl.textContent   = 'Could not fetch latest release. Try again later.';
        errorEl.style.display = '';
        console.error(err);
      }
    }

    function directInstall(btn) {
      const manifest = btn.dataset.manifest;
      if (!manifest) return;
      btn.textContent = 'Opening installer…';
      btn.disabled = true;
      window.location.href = `itms-services://?action=download-manifest&url=${encodeURIComponent(manifest)}`;
      setTimeout(() => {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
            <path d="M8 12l4 4 4-4M12 8v8"/>
          </svg>
          Direct Install`;
        btn.disabled = false;
      }, 3000);
    }

    init();
  </script>
</body>
</html>
